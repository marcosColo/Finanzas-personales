{% extends './index.html' %}

{% block title %}Nuevo Ingreso{% endblock %}

{% block body %}

<div class="container">
    <div class="row">
        <div class="col">
            <form action="/nuevoIngreso/" method="POST">{% csrf_token %}
                <div class="form-group">
                    <input type="text" name="ingreso-Detalle" placeholder="Detalle" required>
                </div>
                <div class="form-group">
                    <input type="number" name="ingMonto" placeholder="Monto" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-success">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
